<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#0a0a0f">
    <title>MusicAgent</title>
    <link rel="icon" href="favicon.svg" type="image/svg+xml">
    <link rel="alternate icon" href="favicon.ico" sizes="any">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            --app-border: rgba(255,255,255,0.065);
            --panel-shadow: 0 24px 70px rgba(0,0,0,0.24);
            --scrollbar-thumb: rgba(167,139,250,0.42);
            --scrollbar-thumb-hover: rgba(236,72,153,0.54);
            --scrollbar-track: transparent;
            color-scheme: dark;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html {
            background: #0a0a0f;
            overflow: hidden;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0a0a0f;
            color: white;
            overflow: hidden;
        }
        body.theme-light {
            --app-border: rgba(15,23,42,0.085);
            --panel-shadow: 0 18px 48px rgba(15,23,42,0.075);
            --scrollbar-thumb: rgba(124,58,237,0.34);
            --scrollbar-thumb-hover: rgba(219,39,119,0.46);
            color-scheme: light;
            background: #f6f3ec;
            color: #172033;
        }
        * {
            scrollbar-width: thin;
            scrollbar-color: var(--scrollbar-thumb) var(--scrollbar-track);
        }
        *::-webkit-scrollbar {
            width: 10px;
            height: 10px;
        }
        *::-webkit-scrollbar-track {
            background: var(--scrollbar-track);
        }
        *::-webkit-scrollbar-thumb {
            background:
                linear-gradient(180deg, var(--scrollbar-thumb), var(--scrollbar-thumb-hover))
                border-box;
            border: 3px solid transparent;
            border-radius: 999px;
            background-clip: padding-box;
        }
        *::-webkit-scrollbar-thumb:hover {
            background:
                linear-gradient(180deg, var(--scrollbar-thumb-hover), var(--scrollbar-thumb))
                border-box;
            border: 2px solid transparent;
            background-clip: padding-box;
        }
        *::-webkit-scrollbar-corner {
            background: transparent;
        }
        .sidebar {
            width: 256px;
            background: linear-gradient(180deg, #1a1a2e 0%, #12121a 100%);
            border-right: 0;
            box-shadow: inset -1px 0 0 rgba(255,255,255,0.045);
        }
        body.theme-light .sidebar {
            background: linear-gradient(180deg, #fff7ed 0%, #eef2ff 100%);
            box-shadow: inset -1px 0 0 rgba(15,23,42,0.07);
        }
        .nav-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 16px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
            color: #9ca3af;
        }
        .nav-item:hover {
            background: rgba(255,255,255,0.05);
            color: white;
        }
        body.theme-light .nav-item:hover {
            background: rgba(15,23,42,0.06);
            color: #111827;
        }
        .nav-item.active {
            background: linear-gradient(90deg, rgba(168,85,247,0.2) 0%, rgba(236,72,153,0.2) 100%);
            color: white;
            border: 1px solid rgba(168,85,247,0.2);
            box-shadow: inset 0 1px 0 rgba(255,255,255,0.06), 0 10px 30px rgba(168,85,247,0.08);
        }
        body.theme-light .nav-item.active {
            background: linear-gradient(90deg, rgba(168,85,247,0.16) 0%, rgba(236,72,153,0.13) 100%);
            color: #111827;
            border-color: rgba(168,85,247,0.16);
            box-shadow: inset 0 1px 0 rgba(255,255,255,0.58), 0 10px 28px rgba(124,58,237,0.09);
        }
        .content-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        .main-content {
            flex: 1;
            overflow-y: auto;
            padding: 24px;
            scrollbar-gutter: stable;
        }
        .player-bar {
            height: 96px;
            background: linear-gradient(90deg, rgba(26,26,46,0.95) 0%, rgba(18,18,26,0.95) 100%);
            border-top: 0;
            backdrop-filter: blur(20px);
            box-shadow: 0 -18px 44px rgba(0,0,0,0.18), inset 0 1px 0 rgba(255,255,255,0.045);
        }
        body.theme-light .player-bar {
            background: linear-gradient(90deg, rgba(255,247,237,0.95) 0%, rgba(239,246,255,0.95) 100%);
            box-shadow: 0 -14px 40px rgba(15,23,42,0.06), inset 0 1px 0 rgba(15,23,42,0.07);
        }
        .gradient-text {
            background: linear-gradient(90deg, #a78bfa 0%, #ec4899 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .card {
            background: linear-gradient(135deg, rgba(26,26,46,0.8) 0%, rgba(18,18,26,0.8) 100%);
            backdrop-filter: blur(20px);
            border-radius: 16px;
            border: 1px solid var(--app-border);
            padding: 24px;
            box-shadow: var(--panel-shadow), inset 0 1px 0 rgba(255,255,255,0.035);
        }
        body.theme-light .card {
            background: linear-gradient(135deg, rgba(255,255,255,0.94) 0%, rgba(248,250,252,0.9) 100%);
            border-color: var(--app-border);
            box-shadow: var(--panel-shadow), inset 0 1px 0 rgba(255,255,255,0.75);
        }
        .play-button {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: linear-gradient(90deg, #a78bfa 0%, #ec4899 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: transform 0.2s;
        }
        .play-button:hover { transform: scale(1.05); }
        input[type="range"] {
            -webkit-appearance: none;
            height: 10px;
            border-radius: 6px;
            background: rgba(255,255,255,0.12);
            outline: none;
            cursor: pointer;
            pointer-events: auto;
        }
        input[type="range"]::-webkit-slider-runnable-track {
            height: 10px;
            border-radius: 6px;
            background: rgba(255,255,255,0.12);
        }
        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 18px;
            height: 18px;
            border-radius: 50%;
            background: #a78bfa;
            cursor: pointer;
            margin-top: -4px;
            box-shadow: 0 0 0 8px rgba(167,139,250,0.08);
        }
        input[type="range"]:focus::-webkit-slider-runnable-track {
            background: rgba(167,139,250,0.18);
        }
        input[type="range"]::-moz-range-track {
            height: 10px;
            border-radius: 6px;
            background: rgba(255,255,255,0.12);
        }
        input[type="range"]::-moz-range-thumb {
            width: 18px;
            height: 18px;
            border-radius: 50%;
            background: #a78bfa;
            border: none;
            box-shadow: 0 0 0 8px rgba(167,139,250,0.08);
        }
        input[type="range"]::-ms-track {
            height: 10px;
            background: transparent;
            border-color: transparent;
            color: transparent;
        }
        input[type="range"]::-ms-fill-lower,
        input[type="range"]::-ms-fill-upper {
            background: rgba(255,255,255,0.12);
            border-radius: 6px;
        }
        .volume-control {
            min-width: 170px;
            padding: 8px 10px;
            border-radius: 999px;
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.06);
            transition: background 0.2s ease, border-color 0.2s ease;
        }
        .volume-control:hover,
        .volume-control:focus-within {
            background: rgba(255,255,255,0.075);
            border-color: rgba(167,139,250,0.24);
        }
        .volume-slider {
            width: 128px;
            height: 20px !important;
            border-radius: 999px;
            background: linear-gradient(90deg, #a78bfa 0 var(--volume-level, 70%), rgba(255,255,255,0.14) var(--volume-level, 70%) 100%) !important;
        }
        .volume-slider::-webkit-slider-runnable-track {
            height: 6px !important;
            border-radius: 999px;
            background: transparent !important;
        }
        .volume-slider::-webkit-slider-thumb {
            width: 20px !important;
            height: 20px !important;
            margin-top: -7px !important;
            box-shadow: 0 0 0 9px rgba(167,139,250,0.12), 0 4px 14px rgba(0,0,0,0.24) !important;
        }
        .volume-slider::-moz-range-track {
            height: 6px !important;
            border-radius: 999px;
            background: rgba(255,255,255,0.14) !important;
        }
        .volume-slider::-moz-range-progress {
            height: 6px;
            border-radius: 999px;
            background: #a78bfa;
        }
        .volume-slider::-moz-range-thumb {
            width: 20px !important;
            height: 20px !important;
            box-shadow: 0 0 0 9px rgba(167,139,250,0.12), 0 4px 14px rgba(0,0,0,0.24) !important;
        }
        body.theme-light .volume-control {
            background: rgba(15,23,42,0.045);
            border-color: rgba(15,23,42,0.08);
        }
        body.theme-light .volume-control:hover,
        body.theme-light .volume-control:focus-within {
            background: rgba(124,58,237,0.08);
            border-color: rgba(124,58,237,0.2);
        }
        .chart-bar {
            transition: height 0.3s ease;
        }
        .message-bubble {
            max-width: 70%;
            padding: 16px;
            border-radius: 16px;
            margin-bottom: 12px;
        }
        .message-user {
            background: linear-gradient(90deg, rgba(168,85,247,0.22) 0%, rgba(236,72,153,0.2) 100%);
            border: 1px solid rgba(168,85,247,0.2);
            margin-left: auto;
            box-shadow: inset 0 1px 0 rgba(255,255,255,0.045);
        }
        .message-ai {
            background: rgba(255,255,255,0.045);
            border: 1px solid var(--app-border);
            box-shadow: inset 0 1px 0 rgba(255,255,255,0.035);
        }
        body.theme-light .message-user {
            background: linear-gradient(90deg, rgba(147,51,234,0.16) 0%, rgba(219,39,119,0.13) 100%);
            border-color: rgba(147,51,234,0.16);
            color: #312e81;
        }
        body.theme-light .message-ai {
            background: rgba(255,255,255,0.76);
            border-color: rgba(15,23,42,0.075);
            color: #172033;
        }
        .lyric-line {
            text-align: center;
            padding: 8px 0;
            transition: all 0.4s ease;
        }
        .lyric-active {
            font-size: 1.5rem;
            font-weight: 600;
            background: linear-gradient(90deg, #a78bfa 0%, #ec4899 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            transform: scale(1.15);
        }
        .lyric-inactive {
            color: #9ca3af;
            transform: scale(0.85);
            opacity: 0.35;
        }
        body.theme-light .lyric-inactive {
            color: #475569;
            opacity: 0.5;
        }
        .immersive-player {
            --accent-rgb: 96, 184, 255;
            --accent-soft-rgb: 232, 94, 194;
            --shadow-rgb: 3, 11, 22;
            --immersive-progress: 0%;
            position: fixed;
            inset: 0;
            z-index: 50;
            overflow: hidden;
            isolation: isolate;
            background: rgb(var(--shadow-rgb));
            color: white;
            font-family: "Segoe UI Variable Display", "Segoe UI", "Microsoft YaHei UI", sans-serif;
        }
        .immersive-player::before {
            content: '';
            position: absolute;
            inset: -18%;
            background-image: var(--immersive-cover);
            background-size: cover;
            background-position: center;
            filter: blur(92px) saturate(1.85) contrast(1.1);
            transform: scale(1.18);
            opacity: 0.66;
            z-index: -5;
        }
        .immersive-player::after {
            content: '';
            position: absolute;
            inset: 0;
            background:
                linear-gradient(105deg, rgba(var(--shadow-rgb), 0.92) 0%, rgba(var(--shadow-rgb), 0.68) 42%, rgba(var(--shadow-rgb), 0.86) 100%),
                linear-gradient(70deg, rgba(var(--accent-rgb), 0.28), transparent 30%, rgba(var(--accent-soft-rgb), 0.2) 72%, transparent),
                conic-gradient(from 210deg at 62% 48%, rgba(var(--accent-rgb), 0.2), transparent 24%, rgba(var(--accent-soft-rgb), 0.14), transparent 58%, rgba(var(--accent-rgb), 0.1));
            z-index: -1;
        }
        .immersive-chromatic {
            position: absolute;
            inset: -12%;
            background-image: var(--immersive-cover);
            background-size: cover;
            background-position: center;
            filter: blur(38px) saturate(2.15) contrast(1.12);
            opacity: 0.2;
            mix-blend-mode: screen;
            transform: translate3d(22px, -12px, 0) scale(1.14);
            z-index: -4;
        }
        .immersive-chromatic::before,
        .immersive-chromatic::after {
            content: '';
            position: absolute;
            inset: 0;
            background: inherit;
            background-size: inherit;
            background-position: inherit;
            mix-blend-mode: screen;
        }
        .immersive-chromatic::before {
            filter: blur(42px) hue-rotate(145deg) saturate(2.2);
            opacity: 0.32;
            transform: translate3d(-28px, 16px, 0);
        }
        .immersive-chromatic::after {
            filter: blur(42px) hue-rotate(-42deg) saturate(2.35);
            opacity: 0.26;
            transform: translate3d(30px, -18px, 0);
        }
        .immersive-cover-echo {
            position: absolute;
            left: clamp(86px, 15vw, 260px);
            top: 50%;
            width: clamp(480px, 45vw, 840px);
            aspect-ratio: 1;
            pointer-events: none;
            background: var(--immersive-cover) center / cover no-repeat;
            filter: blur(44px) saturate(1.75) contrast(1.08);
            opacity: 0.5;
            transform: translate(-22%, -50%) scale(1.08);
            mix-blend-mode: screen;
            z-index: -2;
            -webkit-mask-image: radial-gradient(circle at 48% 48%, #000 0%, rgba(0,0,0,0.88) 36%, rgba(0,0,0,0.34) 63%, transparent 78%);
            mask-image: radial-gradient(circle at 48% 48%, #000 0%, rgba(0,0,0,0.88) 36%, rgba(0,0,0,0.34) 63%, transparent 78%);
        }
        .immersive-cover-echo::after {
            content: '';
            position: absolute;
            inset: 0;
            background: radial-gradient(circle at 50% 45%, rgba(var(--accent-rgb), 0.24), transparent 62%);
            mix-blend-mode: overlay;
        }
        .immersive-colorwash {
            position: absolute;
            inset: 0;
            pointer-events: none;
            background:
                linear-gradient(90deg, rgba(var(--accent-rgb), 0.22), transparent 31%, transparent 63%, rgba(var(--accent-soft-rgb), 0.16)),
                linear-gradient(180deg, rgba(0,0,0,0.1), rgba(0,0,0,0.5));
            backdrop-filter: saturate(1.2);
            z-index: 0;
        }
        .immersive-grain {
            position: absolute;
            inset: 0;
            pointer-events: none;
            opacity: 0.11;
            background-image:
                linear-gradient(90deg, rgba(255,255,255,0.13) 1px, transparent 1px),
                linear-gradient(180deg, rgba(255,255,255,0.09) 1px, transparent 1px);
            background-size: 46px 46px, 46px 46px;
            mix-blend-mode: overlay;
            z-index: 1;
        }
        .immersive-layout {
            position: relative;
            z-index: 2;
            height: 100%;
            display: grid;
            grid-template-columns: minmax(320px, 38vw) minmax(460px, 1fr);
            align-items: center;
            gap: clamp(18px, 3.4vw, 58px);
            padding: clamp(44px, 7vw, 96px) clamp(48px, 8vw, 128px) clamp(112px, 11vh, 156px);
        }
        .immersive-cover {
            width: clamp(240px, 25vw, 380px);
            aspect-ratio: 1;
            border-radius: 14px;
            overflow: hidden;
            position: relative;
            box-shadow: 0 34px 110px rgba(0, 0, 0, 0.5), 0 0 72px rgba(var(--accent-rgb), 0.2);
            background: rgba(255,255,255,0.08);
        }
        .immersive-cover::before,
        .immersive-cover::after {
            content: '';
            position: absolute;
            inset: 0;
            background: var(--immersive-cover) center / cover;
            opacity: 0.32;
            mix-blend-mode: screen;
            pointer-events: none;
        }
        .immersive-cover::before {
            transform: translate(-4px, 2px);
            filter: hue-rotate(150deg) saturate(1.9);
        }
        .immersive-cover::after {
            transform: translate(4px, -2px);
            filter: hue-rotate(-35deg) saturate(1.9);
        }
        .immersive-cover img {
            position: relative;
            z-index: 1;
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .immersive-title {
            margin-top: 36px;
            max-width: min(720px, 42vw);
            font-size: clamp(2.45rem, 4.9vw, 6rem);
            line-height: 0.98;
            letter-spacing: 0;
            font-weight: 250;
            text-align: center;
            text-shadow: 0 12px 42px rgba(var(--accent-rgb), 0.3), 0 26px 80px rgba(0, 0, 0, 0.55);
        }
        .immersive-artist {
            margin-top: 20px;
            font-size: clamp(1rem, 1.34vw, 1.34rem);
            color: rgba(238, 244, 255, 0.78);
            text-align: center;
            font-weight: 400;
        }
        .immersive-meta {
            margin-top: 26px;
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            align-items: center;
            gap: 10px 0;
            color: rgba(224, 236, 255, 0.36);
            font-size: 0.9rem;
        }
        .immersive-meta span {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            min-width: 0;
        }
        .immersive-meta svg {
            width: 16px;
            height: 16px;
            flex: 0 0 16px;
        }
        .immersive-copy {
            display: flex;
            flex-direction: column;
            align-items: center;
            max-width: 720px;
        }
        .immersive-lyrics-wrap {
            height: min(82vh, 780px);
            perspective: 1500px;
            display: flex;
            align-items: center;
            justify-content: flex-start;
            overflow: visible;
            transform: translateX(clamp(-72px, -4vw, -28px));
        }
        .immersive-lyrics-panel {
            position: relative;
            width: min(980px, 54vw);
            height: 100%;
            overflow: visible;
            scrollbar-width: none;
            padding: 0;
            transform-style: preserve-3d;
        }
        .immersive-lyrics-panel::-webkit-scrollbar {
            display: none;
        }
        .immersive-lyrics-inner {
            position: absolute;
            inset: 0;
            transform-style: preserve-3d;
        }
        .immersive-lyric-line {
            position: absolute;
            left: 0;
            top: 50%;
            width: min(760px, 43vw);
            text-align: left;
            font-size: clamp(1.25rem, 1.78vw, 2.45rem);
            line-height: 1.16;
            font-weight: 760;
            letter-spacing: 0;
            color: rgba(231, 238, 255, 0.33);
            text-shadow: 0 16px 44px rgba(0,0,0,0.46);
            opacity: var(--line-opacity, 0.18);
            transform-origin: clamp(-720px, -40vw, -380px) 50%;
            transform: translate3d(var(--line-x, 0), calc(-50% + var(--line-y, 0px)), var(--line-z, 0)) rotateZ(var(--line-rotation, 0deg)) rotateY(var(--line-tilt, 0deg)) scale(var(--line-scale, 0.94));
            transition: color 0.35s ease, opacity 0.35s ease, transform 0.35s ease, filter 0.35s ease;
            filter: blur(var(--line-blur, 0px));
            will-change: transform, opacity;
            overflow-wrap: break-word;
            word-break: normal;
            z-index: var(--line-z-index, 1);
            pointer-events: none;
        }
        .immersive-lyric-line.is-active {
            color: rgba(248, 251, 255, 0.98);
            opacity: 1;
            font-size: clamp(1.45rem, 2.08vw, 2.85rem);
            filter: blur(0) drop-shadow(0 0 18px rgba(var(--accent-rgb), 0.34));
            text-shadow: 0 0 22px rgba(var(--accent-rgb), 0.34), 0 18px 48px rgba(0,0,0,0.58);
        }
        .immersive-close {
            position: absolute;
            top: 24px;
            right: 24px;
            z-index: 5;
            width: 48px;
            height: 48px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: rgba(255,255,255,0.82);
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,255,255,0.16);
            backdrop-filter: blur(18px);
            transition: opacity 0.35s ease, transform 0.35s ease, background 0.2s ease, color 0.2s ease;
        }
        .immersive-close:hover {
            transform: scale(1.05);
            background: rgba(255,255,255,0.14);
            color: white;
        }
        .immersive-controls {
            position: absolute;
            left: clamp(32px, 5vw, 88px);
            right: clamp(32px, 5vw, 88px);
            bottom: 24px;
            z-index: 5;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 16px;
            transition: opacity 0.35s ease, transform 0.35s ease;
        }
        .immersive-play-toggle {
            width: 52px;
            height: 52px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            background: rgba(255,255,255,0.12);
            border: 1px solid rgba(255,255,255,0.18);
            backdrop-filter: blur(20px);
            box-shadow: 0 16px 48px rgba(0,0,0,0.35), 0 0 34px rgba(var(--accent-rgb), 0.22);
            transition: transform 0.2s ease, background 0.2s ease;
        }
        .immersive-play-toggle:hover {
            transform: scale(1.06);
            background: rgba(255,255,255,0.18);
        }
        .immersive-timeline {
            width: 100%;
            display: grid;
            grid-template-columns: 48px 1fr 48px;
            align-items: center;
            gap: 14px;
            color: rgba(237, 245, 255, 0.66);
            font-size: 0.78rem;
            font-variant-numeric: tabular-nums;
        }
        .immersive-progress-slider {
            -webkit-appearance: none;
            appearance: none;
            width: 100%;
            height: 4px !important;
            border-radius: 999px;
            background: linear-gradient(90deg, rgba(var(--accent-rgb), 0.98) 0 var(--immersive-progress), rgba(255,255,255,0.22) var(--immersive-progress) 100%) !important;
            box-shadow: 0 0 28px rgba(var(--accent-rgb), 0.18);
        }
        .immersive-progress-slider::-webkit-slider-runnable-track {
            height: 4px !important;
